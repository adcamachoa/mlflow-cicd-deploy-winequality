name: MLflow Wine Quality Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ml_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Clonar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ESTE PASO ES EL QUE SOLUCIONA EL MODULENOTFOUNDERROR
      - name: 🛠️ Preparar herramientas base
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel

      - name: ⚙️ Instalar dependencias
        run: make install

      - name: 🔨 Entrenar modelo
        run: |
          pip install setuptools
          make train

      - name: ✅ Validar modelo
        run: make validate

      - name: 📤 Subir artefacto
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wine-quality-model
          path: model.pkl